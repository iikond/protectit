<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Protect!T - Rate Limit Defender</title>
    <link rel="stylesheet" href="../../../static/css/main.css">
    <link rel="icon" href="../../../static/img/Ver1.png">
</head>
<body>
    <div class="game-container">
        <header class="container">
            <span class="logo">Protect!T</span>
            <nav>
                <ul>
                    <li><a href="/">Rules</a></li>
                    <li><a href="stage1">First round</a></li>
                    <li><a href="stage2">Second round</a></li>
                    <li class="active"><a href="#">Third round</a></li>
                    <li><a href="leaderboard">Leaderboard</a></li>
                    <li class="button"><a href="#" id="contactBtn">Contacts</a></li>
                </ul>
            </nav>
        </header>

        <h1>⛓️ Rate Limit Defender</h1>
        <p>Выбери защиту, чтобы снизить нагрузку на сервер!</p>
        <div class="stats">
            <div>Нагрузка: <span id="load">0</span>%</div>
            <div>Защищено атак: <span id="score">0</span></div>
            <div>Время: <span id="timer">60</span> с</div>
        </div>
        <div class="attack-message" id="attackMsg">⚡ Готовься к атаке...</div>
        <div class="defense-buttons">
            <button data-defense="rate" class="defense-btn">🚦 Rate Limiting</button>
            <button data-defense="captcha" class="defense-btn">🤖 CAPTCHA</button>
            <button data-defense="bandwidth" class="defense-btn">📡 Upgrade Bandwidth</button>
        </div>
        <div id="gameOverMsg"></div>
        <a href="/" class="back-link">← На главную</a>
    </div>
    <script src="../../../static/js/game3.js"></script>
</body>
</html>
