<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Protect!T - Firewall Defender</title>
    <link rel="stylesheet" href="game2.css">
</head>
<body>
    <div class="game-container">
        <h1>🔥 Firewall Defender</h1>
        <p>Нажми "Блокировать" на IP-адресе, который выполняет DDoS-атаку!</p>
        <div class="stats">
            <div>Заблокировано атак: <span id="score">0</span></div>
            <div>Время: <span id="timer">60</span> с</div>
        </div>
        <div id="ipPanel" class="ip-panel"></div>
        <div id="gameOverMsg"></div>
        <button id="restartBtn" class="restart">🔁 Сыграть снова</button>
        <a href="../index.html" class="back-link">← На главную</a>
    </div>
    <script src="game2.js"></script>
</body>
</html>
